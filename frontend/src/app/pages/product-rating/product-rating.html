<div class="product-rating">
  <span *ngFor="let star of stars">
    <svg
      (click)="setRating(star)"
      (mouseenter)="setHover(star)"
      (mouseleave)="setHover(0)"
      [attr.fill]="(hover || avgRating) >= star ? '#FFD700' : '#ddd'"
      width="18"
      height="18"
      viewBox="0 0 24 24">
      <polygon points="12,2 15,9 22,9 17,14 18,21 12,17 6,21 7,14 2,9 9,9"/>
    </svg>
  </span>
  <span class="vote-count">{{ totalVotes }} vote{{ totalVotes > 1 ? 's' : '' }}</span>
</div>
