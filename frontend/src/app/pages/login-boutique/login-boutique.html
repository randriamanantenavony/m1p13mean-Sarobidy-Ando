<div class="login-container">
  <h2>Connexion Boutique</h2>

  <form (ngSubmit)="login()">

    <input
      type="email"
      [(ngModel)]="email"
      name="email"
      required
    />

    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      required
    />

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Connexion...' : 'Se connecter' }}
    </button>

  </form>
</div>
